<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンスのお知らせ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            padding: 40px 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
        }
        h1 { font-size: 24px; color: #d9534f; margin-bottom: 20px; }
        p { color: #555; font-size: 15px; line-height: 1.6; }
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0066cc;
            padding: 15px;
            margin: 25px 0;
            text-align: left;
        }
        .info-title { font-weight: bold; color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ただいまメンテナンス中です</h1>
        <p>いつもサイトをご覧いただきありがとうございます。<br>ただいま、より快適にご利用いただくためのアップデート作業を行っております。</p>
        
        <div class="info-box">
            <div class="info-title">📅 予定日時</div>
            <div>2026年 〇月 〇日（〇） 00:00 〜 00:00 まで</div>
            <br>
            <div class="info-title">🛠️ 更新内容</div>
            <div>デザインのリニューアル、および新コンテンツの追加</div>
        </div>

        <p>作業が完了するまで、いましばらくお待ちください。</p>
    </div>
</body>
</html>
