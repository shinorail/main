<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Links | Shinorail-Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8f9fa;
            --txt: #333;
            --p: #d4af37;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); }
        .container { max-width: 500px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: #5f6368; margin-bottom: 30px; }
        
        .link-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 18px; border-radius: 15px; color: white; text-decoration: none;
            font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .btn-multix { background: linear-gradient(135deg, #d4af37, #aa8a2e); font-size: 1.1rem; }
        .btn-official { background: #00c853; }
        .btn-lab { background: #333; }
        .btn-twitter { background: #1da1f2; }
        .btn-contact { background: #78909c; }

        /* 広告エリアのスタイル */
        .ad-area {
            margin: 20px 0;
            padding: 15px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-height: 250px; /* 広告の高さに合わせて調整 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .ad-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        footer { margin-top: 30px; font-size: 12px; color: #888; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Shinorail-Group</div>

    <div class="link-grid">
        <a href="https://shinorail.github.io/multi-x-utility/" class="btn btn-multix">
            <i class="fa-solid fa-microchip"></i> Multi-X Utility
        </a>
        <a href="https://t.co/P00r6U34D0" class="btn btn-official">
            <i class="fa-brands fa-google"></i> 篠ノ井乗務区 公式（新）
        </a>
        <a href="https://shinorail.github.io/lab/" class="btn btn-lab">
            <i class="fa-brands fa-github"></i> しのれーるらぼ
        </a>
        <a href="https://x.com/Shino_Rail" class="btn btn-twitter">
            <i class="fa-brands fa-x-twitter"></i> 篠ノ井乗務区 Twitter
        </a>
        <a href="contact.html" class="btn btn-contact">
            <i class="fa-solid fa-file-signature"></i> お問い合わせ
        </a>
    </div>

    <div class="ad-area">
        <div class="ad-label">ADVERTISEMENT</div>
        <script src="https://adm.shinobi.jp/o/2791c03bc086135607731d2a0eb484fd"></script>
    </div>

    <footer>
        <p>※サービス維持のため、広告を表示しています。<br>ご理解とご協力をお願い申し上げます。</p>
        <p>&copy; 2026 Shinorail-Group. All Rights Reserved.</p>
    </footer>
</div>

</body>
</html>
