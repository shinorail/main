<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>総合サポート - 篠ノ井乗務区</title>
    <style>
        :root { --main-blue: #003366; --line-green: #00c300; --bg: #7494c0; --white: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ヘッダー */
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: white; padding: 0 10px; }
        
        /* メニュー */
        #nav-menu { display: none; position: absolute; top: 55px; left: 0; width: 250px; background: white; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); z-index: 1000; }
        #nav-menu a { display: block; padding: 15px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; font-weight: bold; }

        /* チャットログ */
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self: flex-start; background: var(--white); color: black; border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: #85e249; color: black; border-bottom-right-radius: 2px; }

        /* 入力エリア */
        .controls { background: white; padding: 15px; border-top: 1px solid #ddd; position: relative; }
        #suggest-box { position: absolute; bottom: 75px; left: 15px; right: 15px; background: white; border: 1px solid #ccc; border-radius: 10px; max-height: 200px; overflow-y: auto; display: none; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .suggest-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 15px; }
        .suggest-item:hover { background: #f0f4f8; }

        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; border: 2px solid #ccc; padding: 12px; border-radius: 30px; font-size: 16px; outline: none; }
        .send-btn { background: var(--line-green); color: white; border: none; padding: 10px 22px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div style="flex:1">篠ノ井乗務区 総合サポート</div>
    <div id="nav-menu">
        <a href="https://shinorail.github.io/main/">公式HP ほーむ</a>
        <a href="https://shinorail.github.io/">公式リンク集</a>
        <a href="support.html?mode=general">一般窓口へ切替</a>
        <a href="support.html?mode=business">ビジネス窓口へ切替</a>
    </div>
</header>

<div id="chat-log" role="log" aria-live="polite"></div>

<div class="controls">
    <div id="suggest-box"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="メッセージを入力..." autocomplete="off">
        <button class="send-btn" onclick="onSend()">送信</button>
    </div>
</div>

<script>
    // --- 動作確認用テストデータ（10個） ---
    const testData = [
        {q: "383系", a: "特急しなのに使用される振子式車両です。"},
        {q: "姨捨駅", a: "日本三大車窓の一つで、スイッチバックがある駅です。"},
        {q: "篠ノ井線", a: "篠ノ井駅から塩尻駅を結ぶ路線です。"},
        {q: "スイッチバック", a: "勾配を登るために一度列車を後退させる運転方式です。"},
        {q: "善光寺", a: "長野市の象徴。最寄りは長野駅または善光寺下駅です。"},
        {q: "E127系", a: "篠ノ井線の普通列車として活躍する車両です。"},
        {q: "日本三大車窓", a: "姨捨駅、根室本線の狩勝峠、肥薩線の矢岳越えです。"},
        {q: "冠着駅", a: "トンネルの間にある、静かな山あいの駅です。"},
        {q: "特急しなの", a: "名古屋と長野を結ぶ、長野県の主要特急です。"},
        {q: "篠ノ井駅", a: "信越本線と篠ノ井線の接続地点です。"}
    ];

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'general';
    let bizStep = 0;

    // 戻るボタン対策
    window.history.pushState(null, null, null);
    window.addEventListener('popstate', () => location.href = 'session-error.html');

    const log = document.getElementById('chat-log');
    const input = document.getElementById('user-input');
    const suggestBox = document.getElementById('suggest-box');

    function toggleMenu() {
        const m = document.getElementById('nav-menu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    // サジェスト機能
    input.addEventListener('input', () => {
        const val = input.value.trim();
        suggestBox.innerHTML = '';
        if (!val || mode === 'business') { suggestBox.style.display = 'none'; return; }
        const hits = testData.filter(d => d.q.includes(val));
        if (hits.length > 0) {
            hits.forEach(h => {
                const d = document.createElement('div');
                d.className = 'suggest-item';
                d.innerText = h.q;
                d.onclick = () => { input.value = h.q; onSend(); };
                suggestBox.appendChild(d);
            });
            suggestBox.style.display = 'block';
        } else { suggestBox.style.display = 'none'; }
    });

    function onSend() {
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        suggestBox.style.display = 'none';

        if (mode === 'business') {
            handleBusiness(text);
        } else {
            const hit = testData.find(d => text.includes(d.q) || d.q.includes(text));
            setTimeout(() => addMessage(hit ? hit.a : "登録外です。サジェストから選んでください。", 'bot'), 500);
        }
    }

    function handleBusiness(text) {
        setTimeout(() => {
            if (bizStep === 1) {
                addMessage(`${text}様ですね。次にメールアドレスを教えてください。`, 'bot');
                bizStep = 2;
            } else if (bizStep === 2) {
                addMessage("内容を詳しく教えてください。", 'bot');
                bizStep = 3;
            } else if (bizStep === 3) {
                addMessage("シミュレーション送信を完了しました。ありがとうございます。", 'bot');
                bizStep = 0;
            }
        }, 500);
    }

    window.onload = () => {
        addMessage(mode === 'business' ? "【企業窓口】お名前を教えてください。" : "【一般窓口】何について知りたいですか？", "bot");
        if(mode === 'business') bizStep = 1;
        input.onkeypress = (e) => { if(e.key === 'Enter') onSend(); };
    };
</script>
</body>
</html>
