<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>総合サポート - 篠ノ井乗務区</title>
    <style>
        :root { --main-blue: #003366; --line-green: #00c300; --bg: #7494c0; --white: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ヘッダー */
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: white; padding: 0 10px; }
        
        /* メニュー */
        #nav-menu { display: none; position: absolute; top: 55px; left: 0; width: 250px; background: white; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); z-index: 1000; }
        #nav-menu a { display: block; padding: 15px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; font-weight: bold; }

        /* チャットエリア */
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .bot { align-self: flex-start; background: var(--white); color: black; border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: #85e249; color: black; border-bottom-right-radius: 2px; }

        /* ポップアップ（一覧・規約共通） */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; width: 90%; max-width: 500px; max-height: 80vh; 
            border-radius: 15px; padding: 20px; overflow-y: auto; position: relative; 
        }
        .close-btn { position: sticky; top: 0; float: right; font-size: 24px; cursor: pointer; color: #666; font-weight: bold; }
        .list-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item:hover { background: #f0f4f8; }

        /* 入力エリア */
        .controls { background: white; padding: 15px; border-top: 1px solid #ddd; position: relative; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; border: 2px solid #ccc; padding: 12px; border-radius: 30px; font-size: 16px; outline: none; }
        .send-btn { background: var(--line-green); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        /* 規約ボタン */
        .list-btn { background: var(--main-blue); color: white; border: none; padding: 8px 15px; border-radius: 15px; margin-top: 8px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div style="flex:1">篠ノ井乗務区 総合サポート</div>
    <div id="nav-menu">
        <a href="https://shinorail.github.io/main/">公式HP ほーむ</a>
        <a href="https://shinorail.github.io/">公式リンク集</a>
        <a href="javascript:showModal('policy')">利用規約・プライバシー</a>
    </div>
</header>

<div id="chat-log" role="log" aria-live="polite"></div>

<div id="modal-overlay" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="document.getElementById('modal-overlay').style.display='none'">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<div class="controls">
    <div class="input-group">
        <input type="text" id="user-input" placeholder="メッセージを入力..." autocomplete="off">
        <button class="send-btn" onclick="onSend()">送信</button>
    </div>
</div>

<script>
    const testData = [
        {q: "383系", a: "特急しなのに使用される振子式車両です。"},
        {q: "姨捨駅", a: "日本三大車窓の一つで、スイッチバックがある駅です。"},
        {q: "篠ノ井線", a: "篠ノ井駅から塩尻駅を結ぶ路線です。"},
        {q: "スイッチバック", a: "勾配を登るために一度列車を後退させる運転方式です。"},
        {q: "善光寺", a: "長野市の象徴。最寄りは長野駅または善光寺下駅です。"},
        {q: "E127系", a: "篠ノ井線の普通列車として活躍する車両です。"},
        {q: "日本三大車窓", a: "姨捨駅、根室本線の狩勝峠、肥薩線の矢岳越えです。"},
        {q: "冠着駅", a: "トンネルの間にある、静かな山あいの駅です。"},
        {q: "特急しなの", a: "名古屋と長野を結ぶ、長野県の主要特急です。"},
        {q: "篠ノ井駅", a: "信越本線と篠ノ井線の接続地点です。"}
    ];

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'general';
    const log = document.getElementById('chat-log');
    const input = document.getElementById('user-input');

    // 戻るボタン対策
    window.history.pushState(null, null, null);
    window.addEventListener('popstate', () => location.href = 'session-error.html');

    function toggleMenu() {
        const m = document.getElementById('nav-menu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    // モーダル表示
    function showModal(type) {
        const body = document.getElementById('modal-body');
        const overlay = document.getElementById('modal-overlay');
        body.innerHTML = '';
        
        if (type === 'list') {
            body.innerHTML = '<h3>登録単語一覧</h3>';
            testData.forEach(d => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerText = d.q;
                item.onclick = () => { input.value = d.q; onSend(); overlay.style.display = 'none'; };
                body.appendChild(item);
            });
        } else if (type === 'policy') {
            body.innerHTML = `<h3>利用規約・プライバシーポリシー</h3>
            <p>1. 入力された情報は回答およびお問い合わせ対応にのみ使用します。</p>
            <p>2. ブラウザの戻るボタンは使用しないでください。</p>
            <p>3. 当サイトは個人運営であり、JR各社とは関係ありません。</p>`;
        }
        overlay.style.display = 'flex';
    }

    function closeModal(e) { document.getElementById('modal-overlay').style.display = 'none'; }

    function addMessage(text, role, hasBtn = false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        if (hasBtn) {
            const btn = document.createElement('button');
            btn.className = 'list-btn';
            btn.innerText = '登録ワード一覧を見る';
            btn.onclick = () => showModal('list');
            div.appendChild(btn);
        }
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function onSend() {
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        const hit = testData.find(d => text.includes(d.q) || d.q.includes(text));
        setTimeout(() => addMessage(hit ? hit.a : "該当なし。一覧から選んでみてください。", 'bot'), 500);
    }

    window.onload = () => {
        if (mode === 'business') {
            addMessage("【企業窓口】お名前を教えてください。なお、入力前にメニューより規約をご確認ください。", "bot");
        } else {
            addMessage("【一般窓口】篠ノ井線の質問をどうぞ。下のボタンから一覧を確認できます。", "bot", true);
        }
        input.onkeypress = (e) => { if(e.key === 'Enter') onSend(); };
    };
</script>
</body>
</html>
