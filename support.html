<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>総合サポート - 篠ノ井乗務区</title>
    <style>
        :root { --main-blue: #003366; --line-green: #00c300; --bg: #e6ebee; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 16px; line-height: 1.5; }
        .bot { align-self: flex-start; background: white; border: 1px solid #ccc; }
        .user { align-self: flex-end; background: #85e249; }
        .controls { background: white; padding: 15px; border-top: 1px solid #ddd; }
        #quick-replies { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 10px; }
        .q-btn { background: white; border: 2px solid var(--main-blue); color: var(--main-blue); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; min-height: 48px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 25px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<header id="page-header">篠ノ井乗務区 総合サポート</header>

<div id="chat-log" role="log" aria-live="polite">
    <div class="msg bot" id="init-msg">読み込み中...</div>
</div>

<div class="controls">
    <div id="quick-replies"></div>
    <input type="text" id="user-input" placeholder="メッセージを入力..." aria-label="入力欄">
</div>

<script>
    // 1. URLパラメータ取得
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');

    // 2. ブラウザの「戻る」ボタン検知 -> エラーページへ飛ばす
    window.history.pushState(null, null, null);
    window.addEventListener('popstate', function () {
        location.href = 'session-error.html'; 
    });

    // 3. モード別の初期化
    window.onload = () => {
        const msgEl = document.getElementById('init-msg');
        const headerEl = document.getElementById('page-header');
        const quickEl = document.getElementById('quick-replies');

        if (mode === 'business') {
            headerEl.innerText = "ビジネス専用窓口";
            msgEl.innerText = "【企業モード】お仕事の依頼や広報関連の窓口です。まずは貴社名とお名前を教えてください。";
            quickEl.innerHTML = '<button class="q-btn" onclick="location.reload()">キャンセル</button>';
        } else {
            headerEl.innerText = "一般お問い合わせ窓口";
            msgEl.innerText = "【一般モード】駅や車両、鉄道の知識についてお答えします。知りたい言葉を入力してください。";
            quickEl.innerHTML = '<button class="q-btn" onclick="location.href=\'support.html?mode=business\'">ビジネス窓口へ</button>';
        }
    };
</script>
</body>
</html>
