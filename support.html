<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>総合サポート - 篠ノ井乗務区</title>
    <style>
        /* 変数定義（アクセシビリティ・ダークモード対応） */
        :root {
            /* 画像を忠実に再現した基本配色 */
            --bg-body: #92abcc; /* バルーンの後ろの背景色 */
            --bg-header: #2c3e50; /* ヘッダー背景色 */
            --msg-balloon: #ffffff; /* バルーン背景色 */
            --msg-text: #333333; /* バルーン内文字色 */
            --btn-list: #003366; /* 「一覧を見る」ボタン背景色 */
            --btn-list-text: #ffffff; /* 「一覧を見る」ボタン文字色 */
            --msg-user: #85e249; /* ユーザー発言バルーン（前回の緑） */
            --fs-base: 16px;
        }

        /* ダークモード設定（アクセシビリティ） */
        body.dark-mode {
            --bg-body: #1a1a1a;
            --msg-balloon: #333333;
            --msg-text: #ffffff;
            --btn-list: #ffffff;
            --btn-list-text: #003366;
        }

        /* 文字大設定（アクセシビリティ） */
        body.large-text { --fs-base: 20px; }

        body { font-family: sans-serif; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: var(--fs-base); color: var(--msg-text); transition: 0.3s background-color, 0.3s color; }
        
        /* --- ヘッダー（画像再現） --- */
        header { 
            background: var(--bg-header); 
            color: white; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            position: relative; 
            z-index: 1000;
        }
        .menu-btn { 
            font-size: 28px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: white; 
            padding: 0; 
            margin-right: 20px; /* ハンバーガー☰とタイトルの間隔 */
        }
        
        /* --- ハンバーガーメニュー中身 --- */
        #nav-menu { 
            display: none; position: absolute; top: 75px; left: 0; width: 280px; 
            background: #ffffff; box-shadow: 3px 3px 15px rgba(0,0,0,0.3); z-index: 2000; 
            color: #333; border-radius: 0 0 15px 0;
        }
        #nav-menu button { 
            width: 100%; padding: 18px; border: none; background: none; text-align: left; 
            border-bottom: 1px solid #eee; cursor: pointer; font-size: 1.1em; font-weight: bold; 
        }

        /* --- チャットログ --- */
        #chat-log { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scroll-behavior: smooth;
        }
        
        /* --- ボットの発言バルーン（画像再現） --- */
        .msg.bot { 
            align-self: flex-start; 
            background: var(--msg-balloon); 
            color: var(--msg-text);
            border-radius: 40px; /* 大きな角丸 */
            padding: 25px 35px; /* 十分なパディング */
            display: flex;
            align-items: center;
            justify-content: space-between; /* テキストとボタンを引き離す */
            gap: 20px;
            max-width: 90%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .msg.bot .text-part { flex: 1; }
        
        /* バルーン内の「登録ワード一覧を見る」ボタン */
        .list-btn { 
            background: var(--btn-list); 
            color: var(--btn-list-text);
            border: none; 
            padding: 15px 25px; 
            border-radius: 25px; /* 角丸ボタン */
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9em;
            white-space: nowrap; /* 改行防止 */
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .list-btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* --- ユーザーの発言バルーン --- */
        .msg.user { 
            align-self: flex-end; 
            background: var(--msg-user); 
            color: #000;
            border-radius: 25px 25px 2px 25px; /* 角丸の工夫 */
            padding: 15px 20px; 
            max-width: 80%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        /* タイピングアニメーション（前回の演出） */
        .typing::after { content: "●"; animation: blink 0.8s infinite; margin-left: 8px; color: var(--line-green); }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* --- ポップアップ（一覧表示用） --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; width: 85%; max-width: 480px; max-height: 80vh; 
            border-radius: 20px; padding: 25px; overflow-y: auto; position: relative; color: #333;
        }
        .modal-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .modal-item:hover { background: #f0f4f8; color: var(--main-blue); }

        /* --- 入力エリア --- */
        .controls { background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; border: 2px solid #ccc; padding: 15px; border-radius: 35px; font-size: var(--fs-base); outline: none; transition: 0.2s; }
        input[type="text"]:focus { border-color: var(--btn-list); }
        .send-btn { background: var(--line-green); color: white; border: none; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.2s; }
        .send-btn:hover { background: #76d03d; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()" aria-label="メニュー開閉">☰</button>
    <div style="font-size:1.2em; flex:1">篠ノ井乗務区 総合サポート</div>
    <div id="nav-menu">
        <button onclick="toggleDarkMode()">🌙 ダークモード切替</button>
        <button onclick="toggleLargeText()">🅰️ 文字サイズ切替</button>
        <button onclick="location.href='support.html?mode=business'">💼 ビジネス窓口</button>
    </div>
</header>

<div id="chat-log" role="log"></div>

<div id="modal-overlay" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="text-align:center;">登録ワード一覧</h3>
        <div id="modal-body"></div>
    </div>
</div>

<div class="controls">
    <div class="input-group">
        <input type="text" id="user-input" placeholder="メッセージを入力..." autocomplete="off">
        <button class="send-btn" onclick="onSend()">送信</button>
    </div>
</div>

<script>
    // --- テストデータ30個（前回のデータをそのまま統合） ---
    const testData = [
        {q: "383系", a: "特急しなのに使用。振り子式でカーブを高速で通過します。"},
        {q: "E127系", a: "篠ノ井線の普通列車。100番台が活躍しています。"},
        {q: "姨捨駅", a: "日本三大車窓。スイッチバックがある全国的にも有名な駅。"},
        // ... (省略: 前回の30個のデータがここに入ります)
        {q: "篠ノ井乗務区", a: "本サイトの運営母体。鉄道愛を形にしています。"}
    ];

    const log = document.getElementById('chat-log');
    const input = document.getElementById('user-input');

    // 戻るボタン
    window.history.pushState(null, null, null);
    window.addEventListener('popstate', () => location.href = 'session-error.html');

    // ハンバーガーメニュー
    function toggleMenu() {
        const m = document.getElementById('nav-menu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    // アクセシビリティ
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); toggleMenu(); }
    function toggleLargeText() { document.body.classList.toggle('large-text'); toggleMenu(); }

    // ポップアップ開閉
    function showModal() {
        const body = document.getElementById('modal-body');
        body.innerHTML = '';
        testData.forEach(d => {
            const item = document.createElement('div');
            item.className = 'modal-item';
            item.innerText = d.q;
            item.onclick = () => { input.value = d.q; onSend(); closeModal(); };
            body.appendChild(item);
        });
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // タイピングアニメーション
    async function addBotMessage(text, isFirst = false) {
        const div = document.createElement('div');
        div.className = 'msg bot typing';
        
        if (isFirst) {
            // 画像再現: テキスト部分とボタン部分を分ける
            div.innerHTML = `<span class="text-part">${text}</span><button class="list-btn" onclick="showModal()">登録ワード一覧を見る</button>`;
        } else {
            div.innerHTML = `<span class="text-part">${text}</span>`;
        }
        
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        
        // テキスト部分だけアニメーション
        const textSpan = div.querySelector('.text-part');
        const finalText = textSpan.innerText;
        textSpan.innerText = '';
        
        let i = 0;
        return new Promise(resolve => {
            function type() {
                if (i < finalText.length) {
                    textSpan.innerText += finalText.charAt(i);
                    i++;
                    log.scrollTop = log.scrollHeight;
                    setTimeout(type, 25);
                } else {
                    div.classList.remove('typing');
                    resolve();
                }
            }
            type();
        });
    }

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    async function onSend() {
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';

        const hit = testData.find(d => text.includes(d.q) || d.q.includes(text));
        await new Promise(r => setTimeout(r, 600)); // 思考してる風の間
        await addBotMessage(hit ? hit.a : "該当なし。一覧を確認してみてください。");
    }

    window.onload = () => {
        // 画像を忠実に再現した最初のメッセージ
        addBotMessage("【一般窓口】篠ノ井線の質問をどうぞ。下のボタンから一覧を確認できます。", true);
        input.onkeypress = (e) => { if(e.key === 'Enter') onSend(); };
    };
</script>
</body>
</html>
