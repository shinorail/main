<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホーム - 篠ノ井乗務区</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">

<style>
/* ===== index専用デザイン（元UI基準） ===== */
.omikuji-box{
  background:linear-gradient(135deg,#fff5f5,#fff0f0);
  border:2px solid #d32f2f;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
  text-align:center;
}
.omikuji-box h3{color:#d32f2f;margin-top:0}
.btn-omikuji{
  background:#d32f2f;
  color:#fff;
  padding:10px 20px;
  border-radius:5px;
  text-decoration:none;
  font-weight:bold;
  display:inline-block;
}

.sns-info{
  background:#e3f2fd;
  padding:15px;
  border-radius:5px;
  border-left:5px solid #2196f3;
}

.link-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-top:30px;
}
.link-card{
  background:#f0f0f0;
  padding:15px;
  text-align:center;
  text-decoration:none;
  color:#004da0;
  font-weight:bold;
  border-radius:5px;
}

/* ===== お知らせ表示用スタイル ===== */
#top-news-container { background: #fff; border-radius: 4px; }
.top-news-item { border-bottom: 1px solid #eee; padding: 12px 0; font-size: 14px; line-height: 1.6; color: #333; }
.top-news-item strong { color: #111; font-size: 14px; }
.top-news-item p { margin: 4px 0 0 0; color: #555; font-size: 13px; }

/* ===== アンケート ===== */
.survey-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#004da0;
  color:#fff;
  padding:12px 20px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}
.survey-popup{
  position:fixed;
  bottom:80px;
  right:20px;
  width:300px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,.2);
  display:none;
  flex-direction:column;
  z-index:1000;
}
.survey-header{
  background:#004da0;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
}
.survey-body{padding:15px}
.s-rating{display:flex;gap:5px;margin-bottom:10px;}
.s-rating input{display:none}
.s-rating label{
  flex:1;
  text-align:center;
  background:#eee;
  padding:8px 0;
  border-radius:4px;
  cursor:pointer;
}
.s-rating input:checked+label{
  background:#004da0;
  color:#fff;
}
.s-submit{
  width:100%;
  background:#004da0;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:4px;
  font-weight:bold;
  cursor:pointer;
}
#msg { width:100%; box-sizing:border-box; margin-bottom:10px; padding:8px; }

/* ===== 更新通知 ===== */
.update-toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#323232;
  color:#fff;
  padding:14px 20px;
  border-radius:30px;
  font-size:14px;
  display:none;
  z-index:2000;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<header></header>
<nav></nav>

<div class="container">

<section class="omikuji-box">
<h3 id="txt-omikuji-title">【修正完了】ホームのお知らせ不具合が解消されました。</h3>
<p id="txt-omikuji-note">読み込みエラーの不具合が修正され、今後はMarkdown形式で通常通り閲覧いただけます。</p>
</section>

<p id="txt-welcome">
  ようこそ、篠ノ井乗務区の公式ホームページへ。
</p>

<section class="sns-info">
  <strong>◇ 最新情報は X（旧Twitter）で発信中</strong><br>
  <a href="https://x.com/Shino_Rail" target="_blank">@Shino_Rail</a>
</section>

<section style="margin-top:40px">
  <h3>最新のお知らせ</h3>
  <p id="news-loading">読み込み中...</p>
  
  <div id="top-news-container" class="notranslate" translate="no"></div>
  
  <div style="text-align:right;font-size:13px;margin-top:15px">
    <a href="news.html">お知らせ一覧へ</a>
  </div>
</section>

<div class="link-grid">
  <a class="link-card" href="mission.html">▶ 活動理念を見る</a>
  <a class="link-card" href="history.html">▶ 沿革を見る</a>
  <a class="link-card" href="news.html">▶ お知らせを見る</a>
</div>

</div>

<div id="survey-toggle" class="survey-toggle" onclick="toggleSurvey()">📩 アンケート協力</div>

<div id="survey-container" class="survey-popup">
  <div class="survey-header">
    <span>閲覧者アンケート</span>
    <button onclick="toggleSurvey()">×</button>
  </div>

  <form id="survey-form" class="survey-body">
    <div class="s-rating">
      <input id="r1" type="radio" name="rate" value="1"><label for="r1">1</label>
      <input id="r2" type="radio" name="rate" value="2"><label for="r2">2</label>
      <input id="r3" type="radio" name="rate" value="3" checked><label for="r3">3</label>
      <input id="r4" type="radio" name="rate" value="4"><label for="r4">4</label>
      <input id="r5" type="radio" name="rate" value="5"><label for="r5">5</label>
    </div>
    <textarea id="msg" rows="3" placeholder="ご自由にお書きください"></textarea>
    <button type="submit" class="s-submit" id="survey-btn">送信する</button>
  </form>

  <div id="survey-thanks" style="display:none;padding:20px;text-align:center">
    <strong>ありがとうございました。</strong><br>
    <small>今後ともよろしくお願いします。。</small>
  </div>
</div>

<div id="update-toast" class="update-toast">
  新しい更新があります。まもなく反映されます。
</div>

<footer></footer>

<script src="menu.js"></script>

<div id="google_translate_element" style="display:none"></div>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement(
    { pageLanguage:'ja', includedLanguages:'ja,en', autoDisplay:false },
    'google_translate_element'
  );
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
/* ===== 定数・設定 ===== */
const scriptUrl = "https://script.google.com/macros/s/AKfycbwbUTBxVeTkRlAJ1dnBlgcmpGaWI9B0SeMwkwKSwAJYjRDAtVcX67QwA5FcNGaJE9Cq/exec";

/* ===== Markdownお知らせ読み込み機能 ===== */
async function loadTopNewsFromMD() {
    const container = document.getElementById('top-news-container');
    const loading = document.getElementById('news-loading');
    try {
        // 毎回完全に新規リクエストとして取得させ、古いPWAキャッシュをすり抜ける
        const res = await fetch('news.md?nocache=' + new Date().getTime(), { cache: "no-store" });
        if (!res.ok) throw new Error();
        const text = await res.text();

        if (loading) loading.style.display = 'none';

        const items = text.split(/^##\s+/m).filter(item => item.trim() !== "");

        if (items.length === 0) {
            container.innerHTML = "<div class='top-news-item'>現在新しいお知らせはありません。</div>";
            return;
        }

        let finalHtml = "";

        // 最新の3件を取り出して、完全に新しいHTML構造を構築
        items.slice(0, 3).forEach(item => {
            const lines = item.split('\n');
            const titleLine = lines[0].trim();
            const bodyText = lines.slice(1).join('\n').trim();

            const titleHtml = marked.parseInline(titleLine);
            const bodyHtml = marked.parse(bodyText);

            finalHtml += `
                <div class="top-news-item notranslate" translate="no">
                    <div><strong>${titleHtml}</strong></div>
                    <div>${bodyHtml}</div>
                </div>
            `;
        });

        // 枠ごと中身を完全上書き（これで古い残骸は消滅します）
        container.innerHTML = finalHtml;

    } catch(e) {
        if (loading) loading.style.display = 'none';
        container.innerHTML = "<div class='top-news-item'>お知らせの読み込みに失敗しました。</div>";
        console.error(e);
    }
}

/* ===== アンケート送信機能 ===== */
document.getElementById('survey-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('survey-btn');
    btn.disabled = true;
    btn.innerText = "送信中...";

    const rate = document.querySelector('input[name="rate"]:checked').value;
    const msg = document.getElementById('msg').value;
    const name = localStorage.getItem("userName") || "ゲスト";

    const payload = {
        action: "postSurvey",
        name: name,
        rating: rate,
        message: msg
    };

    try {
        await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('survey-form').style.display = 'none';
        document.getElementById('survey-thanks').style.display = 'block';
        setTimeout(() => toggleSurvey(), 3000);
    } catch(e) {
        alert("送信に失敗しました。");
        btn.disabled = false;
        btn.innerText = "送信する";
    }
};

/* ===== UI制御機能 ===== */
function toggleSurvey(){
  const s=document.getElementById('survey-container');
  s.style.display=s.style.display==='flex'?'none':'flex';
}

function surveyVisibility(){
  const btn = document.getElementById('survey-toggle');
  if(btn) btn.style.display = navigator.onLine ? 'block' : 'none';
}
window.addEventListener('online',surveyVisibility);
window.addEventListener('offline',surveyVisibility);
surveyVisibility();

/* ===== PWA・Service Worker関連 ===== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').then(reg => {
      console.log('PWA Ready');
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdate(nw);
          }
        });
      });
    }).catch(err => console.log('PWA Error', err));
  });
}

function showUpdate(waitingSW){
  if(window.innerWidth >= 768) return;
  const t = document.getElementById('update-toast');
  if(t) t.style.display = 'block'; // トースト表示のみ実行（勝手なリロードはさせない）
  if(waitingSW) waitingSW.postMessage({action: 'skipWaiting'});
}

/* ===== 実行 ===== */
loadTopNewsFromMD();
</script>

</body>
</html>
