<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンテナンス中 - 篠ノ井乗務区</title>
<link rel="stylesheet" href="style.css">
<style>
/* メンテナンス画面専用スタイル */
.maintenance-wrapper {
display: flex;
justify-content: center;
align-items: center;
min-height: 70vh;
padding: 15px;
background-color: #f8f9fa;
}
.maintenance-card {
background: #fff;
padding: 30px 20px;
border-radius: 12px;
box-shadow: 0 4px 25px rgba(0,0,0,0.1);
max-width: 550px;
width: 100%;
text-align: center;
border-top: 6px solid #004da0;
box-sizing: border-box;
}

    /* アニメーションエリア */
    .animation-box {
        position: relative;
        height: 80px;
        margin-bottom: 10px;
    }
    .worker {
        font-size: 50px;
        display: inline-block;
        animation: h-work 1.2s infinite alternate ease-in-out;
    }
    .tool {
        font-size: 30px;
        position: relative;
        top: -10px;
        display: inline-block;
        animation: t-rotate 0.6s infinite alternate;
    }
    @keyframes h-work {
        from { transform: translateY(0); }
        to { transform: translateY(-15px); }
    }
    @keyframes t-rotate {
        from { transform: rotate(-20deg); }
        to { transform: rotate(20deg); }
    }

    .m-title {
        font-size: 1.4em;
        color: #333;
        font-weight: bold;
        margin-bottom: 20px;
        line-height: 1.4;
    }

    /* 進捗バー */
    .progress-container {
        width: 90%;
        background-color: #eee;
        border-radius: 10px;
        margin: 20px auto;
        height: 10px;
        overflow: hidden;
        position: relative;
    }
    .progress-bar {
        width: 40%;
        height: 100%;
        background: #004da0;
        position: absolute;
        animation: progress-move 2s infinite ease-in-out;
        border-radius: 10px;
    }
    @keyframes progress-move {
        0% { left: -40%; }
        100% { left: 100%; }
    }

    .m-text {
        font-size: 0.95rem;
        color: #444;
        line-height: 1.7;
        margin-bottom: 25px;
        text-align: left;
        display: inline-block;
    }
    
    .schedule-box {
        background: #fff9c4;
        padding: 10px;
        border-radius: 6px;
        font-weight: bold;
        color: #856404;
        margin-bottom: 20px;
    }

    /* スマホ向け調整 */
    @media (max-width: 480px) {
        .m-title { font-size: 1.2em; }
        .m-text { font-size: 0.85rem; }
        .maintenance-card { padding: 25px 15px; }
    }
</style>
</head>
<body>

<header></header>
<nav></nav>

<div class="container">
<div class="maintenance-wrapper">
<div class="maintenance-card">
<div class="animation-box">
<span class="worker">👷</span>
<span class="tool">🔧</span>
</div>

        <div class="m-title">現在システムメンテナンス中です</div>
        
        <div class="schedule-box">
            再開予定：2026年3月上旬
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="m-text">
            いつも篠ノ井乗務区をご利用いただきありがとうございます。<br>
            現在、より使いやすいサイトを目指して改修作業を行っております。<br>
            修正が完了次第、直ちに公開を再開いたします。
        </div>

        <div style="font-size: 0.8em; color: #999; border-top: 1px solid #eee; padding-top: 15px;">
            Status: Maintenance Mode (Under Construction)
        </div>
    </div>
</div>
</div>

<footer></footer>

<script src="menu.js"></script>

</body>
</html>
