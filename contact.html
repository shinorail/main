<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせメンテナンス - 篠ノ井乗務区</title>
<link rel="stylesheet" href="style.css">
<style>
.maintenance-container {
background: #fff;
padding: 40px 20px;
border-radius: 12px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
max-width: 600px;
margin: 40px auto;
text-align: center;
border-top: 6px solid #004da0;
}

    .work-display {
        font-size: 50px;
        margin-bottom: 20px;
    }
    .worker-emoji {
        display: inline-block;
        animation: bounce 1s infinite alternate;
    }
    .tool-emoji {
        display: inline-block;
        animation: hammer 0.5s infinite alternate;
    }
    @keyframes bounce {
        from { transform: translateY(0); }
        to { transform: translateY(-10px); }
    }
    @keyframes hammer {
        from { transform: rotate(0deg); }
        to { transform: rotate(-40deg); }
    }

    .m-title {
        color: #333;
        font-size: 1.4em;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .schedule-tag {
        background: #e3f2fd;
        color: #004da0;
        padding: 5px 15px;
        border-radius: 20px;
        display: inline-block;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .m-text {
        color: #555;
        line-height: 1.8;
        margin-bottom: 30px;
    }

    .x-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        text-decoration: none;
        padding: 12px 25px;
        border-radius: 30px;
        font-weight: bold;
        transition: 0.3s;
        width: 80%;
        max-width: 300px;
    }
    .x-btn:hover {
        opacity: 0.8;
        transform: scale(1.02);
    }

    @media (max-width: 600px) {
        .maintenance-container { margin: 20px; padding: 30px 15px; }
        .m-title { font-size: 1.2em; }
        .m-text { font-size: 0.9em; }
    }
</style>
</head>
<body>

<header></header>
<nav></nav>

<div class="container">
<div class="maintenance-container">
<div class="work-display">
<span class="worker-emoji">👷</span>
<span class="tool-emoji">🔧</span>
</div>

    <div class="m-title">お問い合わせフォーム<br>メンテナンスのお知らせ</div>

    <div class="schedule-tag">
        再開予定：2026年3月上旬
    </div>

    <div class="m-text">
        システム改修のため、現在お問い合わせの受付を停止しております。<br>
        修正が完了次第、ただちに反映し、受付を再開いたします。
    </div>

    <a href="https://x.com/Shino_Rail" target="_blank" rel="noopener noreferrer" class="x-btn">
        最新情報はX（@Shino_Rail）で確認
    </a>

    <p style="margin-top: 25px; font-size: 0.8em; color: #999;">
        ご不便をおかけしますが、再開まで今しばらくお待ちください。
    </p>
</div>
</div>

<footer></footer>

<script src="menu.js"></script>

</body>
</html>
