<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contact | Shinorail-Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #d4af37; --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; --sub: #94a3b8;
        }
        body {
            font-family: -apple-system, "BIZ UDPGothic", sans-serif;
            background-color: var(--bg); color: var(--txt);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding-bottom: 40px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--p); font-size: 1.8rem; letter-spacing: 2px; margin: 0; }
        
        .form-card {
            background: var(--card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--p); font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; }

        input, textarea {
            width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.7);
            border: 1.5px solid #334155; border-radius: 10px; color: white; font-size: 1rem; box-sizing: border-box;
        }

        .btn-submit {
            width: 100%; background: var(--p); color: #000; border: none; padding: 16px;
            border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-submit:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none !important; }

        .ad-area { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(148, 163, 184, 0.1); text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: var(--sub); text-decoration: none; font-size: 0.9rem; }

        @media (min-width: 768px) { .form-card { padding: 40px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="t-title">Contact</h1>
        <p id="t-desc" style="color:var(--sub); font-size:0.85rem;">お問い合わせ窓口</p>
    </div>

    <div class="form-card">
        <form id="contact-form" action="https://formspree.io/f/mdawoqqg" method="POST">
            <div class="form-group">
                <label id="t-email">メールアドレス</label>
                <input type="email" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label id="t-msg">お問い合わせ内容</label>
                <textarea name="message" rows="5" placeholder="内容を入力してください" required></textarea>
            </div>

            <input type="hidden" name="_next" value="https://shinorail.github.io/main/thanks.html">

            <button type="submit" id="btn-text" class="btn-submit">
                <i class="fa-solid fa-paper-plane"></i> <span id="btn-label">送信する</span>
            </button>
        </form>

        <div class="ad-area">
            <div style="font-size: 10px; color: var(--sub); margin-bottom: 10px;">ADVERTISEMENT</div>
            <script src="https://adm.shinobi.jp/o/2791c03bc086135607731d2a0eb484fd"></script>
        </div>
    </div>
    <a href="links.html" id="t-back" class="back-link">← 戻る</a>
</div>

<script>
    // 1. 言語自動切り替え
    const lang = navigator.language || navigator.userLanguage;
    const isJP = lang.includes('ja');

    const texts = {
        title: isJP ? "Contact" : "Contact",
        desc: isJP ? "お問い合わせ窓口" : "Contact Desk",
        email: isJP ? "メールアドレス" : "Email Address",
        msg: isJP ? "お問い合わせ内容" : "Message",
        btn: isJP ? "送信する" : "Send",
        sending: isJP ? "送信中..." : "Sending...",
        back: isJP ? "← 戻る" : "← Back"
    };

    document.getElementById('t-desc').innerText = texts.desc;
    document.getElementById('t-email').innerText = texts.email;
    document.getElementById('t-msg').innerText = texts.msg;
    document.getElementById('btn-label').innerText = texts.btn;
    document.getElementById('t-back').innerText = texts.back;

    // 2. 送信中の連打防止
    const form = document.getElementById('contact-form');
    const btn = document.getElementById('btn-text');
    const btnLabel = document.getElementById('btn-label');

    form.onsubmit = function() {
        btn.disabled = true; // ボタンを無効化
        btnLabel.innerText = texts.sending; // テキストを「送信中...」に変更
    };
</script>

</body>
</html>
