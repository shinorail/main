<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train-News - 篠ノ井乗務区</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* レイアウトベース調整 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }

        /* ヘッダー・ナビゲーション・ログインバーの一体化 */
        .header-container {
            background: #004da0;
            color: #fff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 12px;
        }

        .site-title {
            font-size: 1.4em;
            font-weight: bold;
            margin: 0;
            letter-spacing: 1px;
        }

        /* ログインステータスバーの強化 */
        .user-status-bar {
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .user-status-bar a {
            color: #ffaa00;
            text-decoration: none;
            font-weight: bold;
            margin: 0 5px;
            transition: color 0.2s;
        }
        .user-status-bar a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* メニュー（ナビゲーション）のレスポンシブ化 */
        .nav-container {
            padding-top: 12px;
        }
        .nav-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .nav-list li a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }
        .nav-list li a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffaa00;
        }
        .nav-list li a.active {
            color: #ffaa00;
            border-bottom: 2px solid #ffaa00;
            border-radius: 0;
        }

        /* コンテンツエリア */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 20px 0; 
        }

        .news-card { 
            background: #fff; 
            border: 1px solid #ddd; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
            border-left: 5px solid #004da0; 
            position: relative; 
            box-sizing: border-box;
        }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .news-card h3 { margin: 0 0 5px; color: #004da0; font-size: 1.1em; padding-right: 35px; }
        
        .fav-btn { position: absolute; top: 12px; right: 10px; background: none; border: none; font-size: 1.4em; cursor: pointer; filter: grayscale(1); transition: 0.2s; z-index: 10; }
        .fav-btn.active { filter: grayscale(0); }
        
        /* ビューオーバーレイ */
        .viewer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; z-index: 9999; }
        .viewer-header { background: #004da0; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .viewer-body { flex: 1; position: relative; background: #525659; overflow: hidden; }
        #pdf-frame { width: 100%; height: 100%; border: none; }
        
        /* コメントサイドバー */
        .comment-sidebar { position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%; background: #f9f9f9; transition: 0.3s; z-index: 10000; display: flex; flex-direction: column; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .comment-sidebar.open { bottom: 0; }
        .comment-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment-item { background: #fff; padding: 10px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #ddd; font-size: 0.9em; position: relative; }
        .official-badge { background: #ffaa00; color: #fff; font-size: 0.75em; padding: 2px 6px; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        .comment-official { border-left: 4px solid #ffaa00; background: #fff9f0; }

        /* スマートフォン向けのレスポンシブ調整 */
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .user-status-bar {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
            }
            .nav-list {
                gap: 8px;
            }
            .nav-list li a {
                font-size: 0.85em;
                padding: 4px 6px;
            }
            .comment-sidebar {
                height: 85%;
            }
        }
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-top">
        <h1 class="site-title">篠ノ井乗務区 公式サイト</h1>
        <div class="user-status-bar">
            <span id="userInfoDisplay">ゲスト 様 | <a href="login.html">ログイン</a></span>
        </div>
    </div>
    <nav class="nav-container">
        <ul class="nav-list">
            <li><a href="index.html">ホーム</a></li>
            <li><a href="news.html">お知らせ</a></li>
            <li><a href="train-news.html" class="active">Train-News</a></li>
            <li><a href="fliers.html">手作り広告</a></li>
            <li><a href="philosophy.html">活動理念</a></li>
            <li><a href="photos.html">写真記録</a></li>
            <li><a href="notebook.html">乗車印帳</a></li>
            <li><a href="faq.html">よくある質問</a></li>
            <li><a href="links.html">SNS/外部リンク</a></li>
            <li><a href="contact.html">お問い合わせ</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <h2 style="border-bottom: 2px solid #004da0; padding-bottom: 10px; margin-top: 20px;">Train-News 一覧</h2>
    <div id="loading" style="text-align:center; padding:40px;">データを読み込み中...</div>
    <div id="news-list" class="news-grid"></div>
</div>

<div id="viewer" class="viewer-overlay">
    <div class="viewer-header">
        <h2 id="v-title" style="font-size:0.9em; margin:0;"></h2>
        <button onclick="closeViewer()" style="background:#ff4444; color:white; border:none; padding:5px 15px; border-radius:3px; cursor:pointer;">閉じる</button>
    </div>
    <div class="viewer-body">
        <iframe id="pdf-frame"></iframe>
        <button onclick="toggleComments(true)" style="position:absolute; right:0; top:40%; background:#004da0; color:white; border:none; padding:15px 8px; writing-mode:vertical-rl; border-radius:5px 0 0 5px; cursor:pointer; font-weight:bold;">💬 コメント</button>
        
        <div id="comment-area" class="comment-sidebar">
            <div onclick="toggleComments(false)" style="background:#ddd; text-align:center; padding:10px; font-weight:bold; cursor:pointer;">▼ 閉じる</div>
            <div id="comment-list" class="comment-list"></div>
            <form id="comment-form" style="padding:15px; background:#eee; border-top:1px solid #ccc;">
                <input type="text" id="u-name" placeholder="お名前" required style="width:100%; margin-bottom:8px; padding:10px; box-sizing:border-box;">
                <div id="admin-pass-area" style="display:none; margin-bottom:8px;">
                    <input type="password" id="u-pass" placeholder="公式用パスワード" style="width:100%; padding:8px; border:1px solid #ffaa00; box-sizing:border-box;">
                </div>
                <textarea id="u-msg" placeholder="コメントを入力" required style="width:100%; margin-bottom:8px; padding:10px; box-sizing:border-box; height:60px;"></textarea>
                <button type="submit" id="comment-submit" style="width:100%; background:#004da0; color:white; border:none; padding:12px; font-weight:bold; cursor:pointer; border-radius:4px;">コメント送信</button>
            </form>
        </div>
    </div>
</div>

<script src="menu.js"></script>

<script>
    const newsScriptUrl = "https://script.google.com/macros/s/AKfycbwbUTBxVeTkRlAJ1dnBlgcmpGaWI9B0SeMwkwKSwAJYjRDAtVcX67QwA5FcNGaJE9Cq/exec";

    const _auth = "cGFzc3dvcmQyMDI2"; 
    const isAuthorized = (p) => btoa(p) === _auth;

    // ログイン状態表示の同期ロジック強化
    function updateLoginUI() {
        const email = localStorage.getItem("userEmail");
        const name = localStorage.getItem("userName");
        
        if (email) {
            // ログイン中：ユーザー名（またはメアド）とマイページ、ログアウトを表示
            document.getElementById("userInfoDisplay").innerHTML = `
                <strong>${name || email}</strong> 様 | 
                <a href="mypage.html">マイページ</a> | 
                <a href="#" onclick="logout(event)">ログアウト</a>
            `;
            if(name) {
                const nameInput = document.getElementById("u-name");
                if (nameInput) nameInput.value = name;
            }
        } else {
            // 未ログイン：ゲスト状態
            document.getElementById("userInfoDisplay").innerHTML = `ゲスト 様 | <a href="login.html">ログイン</a>`;
        }
        
        // 公式管理者の非表示パスワード枠制御
        const uNameEl = document.getElementById("u-name");
        if (uNameEl) {
            uNameEl.addEventListener("input", (e) => {
                document.getElementById("admin-pass-area").style.display = (e.target.value === "篠ノ井乗務区") ? "block" : "none";
            });
        }
    }

    function logout(event) { 
        if(event) event.preventDefault();
        localStorage.removeItem("userEmail"); 
        localStorage.removeItem("userName"); // 必要に応じて追加
        location.reload(); 
    }

    function toggleFavorite(event, id, title) {
        event.stopPropagation();
        let favs = JSON.parse(localStorage.getItem("favNews") || "[]");
        const index = favs.findIndex(f => f.id == id);
        if (index > -1) { favs.splice(index, 1); event.target.classList.remove("active"); } 
        else { favs.push({id: id, title: title}); event.target.classList.add("active"); }
        localStorage.setItem("favNews", JSON.stringify(favs));
    }

    async function loadNews() {
        try {
            const res = await fetch(newsScriptUrl + "?sheet=新聞");
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error("Format Error");

            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('news-list');
            const favs = JSON.parse(localStorage.getItem("favNews") || "[]");

            data.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                const isLocked = item.isMemberOnly || item['限定'] === true;
                const lockLabel = isLocked ? '<span style="color:red; font-size:0.8em; font-weight:bold;"> [会員限定]</span>' : '';
                const isFaved = favs.some(f => f.id == item['号数']) ? "active" : "";

                card.onclick = () => openViewer(item.URL, item['号数'], item['見出し'], isLocked);
                card.innerHTML = `
                    <button class="fav-btn ${isFaved}" onclick="toggleFavorite(event, '${item['号数']}', '${item['見出し']}')">⭐</button>
                    <h3>${item['号数'] ? '第 '+item['号数']+' 号' : '号外'}${lockLabel}</h3>
                    <p style="font-size:0.85em; color:#666; margin-bottom:5px;">📅 ${item['発行日'] || "未設定"}</p>
                    <p style="font-weight:bold; margin:0;">${item['見出し'] || "無題"}</p>
                `;
                list.appendChild(card);
            });
        } catch(e) { document.getElementById('loading').innerText = "エラー：データ取得に失敗しました。"; }
    }

    function openViewer(url, id, title, isLocked) {
        // 会員限定記事の場合のログインチェックを確実にする
        if (isLocked && !localStorage.getItem("userEmail")) { 
            alert("会員限定記事です。ログインしてください。"); 
            return; 
        }
        document.getElementById('v-title').innerText = `${id ? '第'+id+'号' : '号外'} ${title}`;
        document.getElementById('pdf-frame').src = url.replace('/view?usp=sharing', '/preview');
        document.getElementById('viewer').style.display = 'flex';
        loadComments(id);
    }

    function closeViewer() { document.getElementById('viewer').style.display = 'none'; document.getElementById('pdf-frame').src = ""; }
    function toggleComments(show) { document.getElementById('comment-area').classList.toggle('open', show); }

    async function loadComments(id) {
        const list = document.getElementById('comment-list');
        list.innerHTML = "<small>読込中...</small>";
        try {
            const res = await fetch(`${newsScriptUrl}?action=getComments&id=${id}`);
            const data = await res.json();
            list.innerHTML = data.length ? "" : "<small>コメントはありません</small>";
            data.forEach(c => {
                const div = document.createElement('div');
                const isOfficial = (c.名前 === "篠ノ井乗務区");
                div.className = 'comment-item' + (isOfficial ? ' comment-official' : '');
                div.innerHTML = `<strong>${c.名前}${isOfficial ? '<span class="official-badge">公式</span>' : ''}</strong> <small style="color:#999;">${c.日付}</small><br>${c.内容}`;
                list.appendChild(div);
            });
        } catch(e) { list.innerHTML = "<small>読み込み失敗</small>"; }
    }

    document.getElementById('comment-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('comment-submit');
        const nameInput = document.getElementById('u-name').value;
        const passInput = document.getElementById('u-pass').value;

        btn.disabled = true;
        btn.innerText = "送信中...";

        if (nameInput === "篠ノ井乗務区" && !isAuthorized(passInput)) {
            alert("パスワードが違います。");
            btn.disabled = false;
            btn.innerText = "コメント送信";
            return;
        }

        const idMatch = document.getElementById('v-title').innerText.match(/\d+/);
        const data = { action: "postComment", id: idMatch ? idMatch[0] : "", name: nameInput, comment: document.getElementById('u-msg').value };

        try {
            await fetch(newsScriptUrl, { method: 'POST', body: JSON.stringify(data) });
            alert("送信完了。承認をお待ちください。");
            document.getElementById('u-msg').value = "";
            toggleComments(false);
        } catch(e) { alert("送信エラー"); } finally {
            btn.disabled = false;
            btn.innerText = "コメント送信";
        }
    };

    // 初期化処理の実行
    updateLoginUI();
    loadNews();
</script>
</body>
</html>
