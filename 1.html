<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEMU風爆光フル機能EC（完全版）</title>
<style>
  body {
    background: #ffefdb;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: center;
    margin: 0;
  }
  header {
    background: linear-gradient(90deg, #ff3b3b, #ff9a00);
    color: white;
    padding: 10px;
    box-shadow: 0 0 20px #ff3b3b;
  }
  .logo {
    font-size: 28px;
    font-weight: bold;
  }
  .nav button {
    margin: 0 5px;
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    background: #fff3d6;
    cursor: pointer;
  }
  .nav button:hover {
    background: #ffe08a;
  }

  /* ログイン神殿化 */
  #login-area {
    background: linear-gradient(135deg, #ff9a00, #ff3b3b);
    color: gold;
    padding: 20px;
    margin: 10px auto;
    border-radius: 20px;
    box-shadow: 0 0 40px gold;
    animation: glow 3s infinite;
    display: inline-block;
  }
  #login-area input {
    border-radius: 5px;
    border: none;
    padding: 5px;
    margin: 3px;
  }
  @keyframes glow {
    0% { box-shadow:0 0 20px gold; }
    50% { box-shadow:0 0 40px orange; }
    100% { box-shadow:0 0 20px gold; }
  }

  #bonus {
    background: gold;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    font-weight: bold;
  }

  /* ルーレット・ガチャボタン */
  #wheel {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 10px solid gold;
    background: conic-gradient(
      #ff9a00 0deg 60deg,
      #ff3b3b 60deg 120deg,
      #ff9a00 120deg 180deg,
      #ff3b3b 180deg 240deg,
      #ff9a00 240deg 300deg,
      #ff3b3b 300deg 360deg
    );
    margin: 10px auto;
    box-shadow: 0 0 30px gold;
  }
  .spin-btn, .gacha-btn, .otoshidama-btn {
    background: #ff3b3b;
    color: white;
    padding: 8px 16px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 10px #ff3b3b;
    margin: 5px;
  }
  .spin-btn { animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 10px #ff3b3b; }
    50% { transform: scale(1.05); box-shadow: 0 0 20px #ff9a00; }
    100% { transform: scale(1); box-shadow: 0 0 10px #ff3b3b; }
  }

  #fxCanvas {
    display: block;
    margin: 10px auto;
    background: transparent;
  }

  /* 商品一覧・おすすめ */
  #product-list, #recommend-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 10px;
  }
  .product-card {
    width: 150px;
    background: white;
    border-radius: 10px;
    padding: 10px;
    margin: 8px;
    box-shadow: 0 0 10px #ff9a00;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s;
  }
  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 15px #ff3b3b;
  }
  .product-img {
    width: 100%;
    border-radius: 10px;
  }
  .price {
    color: #ff3b3b;
    font-weight: bold;
  }
  .sale-label {
    background: red;
    color: white;
    padding: 3px 6px;
    font-size: 11px;
    border-radius: 5px;
    display: inline-block;
    margin-bottom: 5px;
  }
  .timer-label {
    font-size: 11px;
    color: #ff3b3b;
  }

  #detail {
    display: none;
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    box-shadow: 0 0 20px #ff9a00;
  }

  #cart {
    background: #fff7e6;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
  }

  #order {
    display: none;
    background: #ffe8c2;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
  }

  input, select {
    padding: 5px;
    margin: 3px;
  }

  #missions, #ranking {
    background: #fff7e6;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
  }

  /* 爆光フラッシュ */
  @keyframes flash {
    0% { background:white; }
    100% { background:#ffefdb; }
  }

  /* AIおすすめ光 */
  .recommend-glow {
    animation: glow2 2s infinite;
  }
  @keyframes glow2 {
    0% { box-shadow:0 0 10px gold; }
    50% { box-shadow:0 0 25px orange; }
    100% { box-shadow:0 0 10px gold; }
  }

  /* 王宮ランキング */
  #ranking {
    background: linear-gradient(180deg, gold, transparent);
    box-shadow: 0 0 20px gold;
    padding: 10px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔥TEMU風爆光フル機能EC（完全版）🔥</div>
  <div class="nav">
    <button onclick="showSection('main')">ホーム</button>
    <button onclick="showSection('order')">注文ページ</button>
  </div>
</header>

<div id="login-area">
  <div>ログインID: <input id="login-id" placeholder="user1"></div>
  <div>パスワード: <input id="login-pass" type="password" placeholder="pass1"></div>
  <button onclick="login()">入場する🔥</button>
  <div id="login-status"></div>
</div>

<div id="bonus"></div>

<div id="missions"></div>
<div id="ranking"></div>

<div id="main-section">
  <div id="wheel"></div>
  <button class="spin-btn" onclick="spin()">ルーレット</button>
  <button class="gacha-btn" onclick="gacha()">ガチャ</button>
  <button class="otoshidama-btn" onclick="otoshidama()">お年玉</button>
  <canvas id="fxCanvas" width="300" height="150"></canvas>

  <h2>おすすめ商品</h2>
  <div id="product-list"></div>

  <h3>AIおすすめ</h3>
  <div id="recommend-list"></div>

  <div id="detail"></div>

  <div id="cart">
    <h3>🛒カート</h3>
    <div id="cart-items"></div>
    <p id="cart-total"></p>
    <div>
      クーポンコード: <input id="coupon" placeholder="OFF10">
      ポイント使用: <input id="use-points" type="number" min="0">
      <button onclick="applyDiscount()">割引適用</button>
      <p id="discount-info"></p>
    </div>
    <button onclick="goOrder()">この内容で注文ページへ</button>
  </div>
</div>

<div id="order">
  <h3>📦注文確認</h3>
  <div id="order-items"></div>
  <p id="order-total"></p>
  <div>
    お名前: <input id="order-name"><br>
    住所: <input id="order-address"><br>
    支払い方法:
    <select id="order-pay">
      <option>クレジットカード</option>
      <option>コンビニ払い</option>
      <option>代引き</option>
    </select>
  </div>
  <button onclick="submitOrder()">注文確定</button>
  <p id="order-result"></p>
</div>

<!-- 爆光エンジン用 Canvas -->
<canvas id="explosionCanvas" width="400" height="300"
style="position:fixed;top:0;left:0;pointer-events:none;z-index:99999;"></canvas>

<!-- お年玉封筒乱舞エリア -->
<div id="otoshidama-area" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></div>

<script>
/* 疑似ユーザーDB */
const users = [
  { id: "user1", pass: "pass1", points: 0, spent: 0 },
  { id: "vip", pass: "vip123", points: 100, spent: 0 }
];
let currentUser = null;

/* ログイン */
function login() {
  const id = document.getElementById("login-id").value;
  const pass = document.getElementById("login-pass").value;
  const user = users.find(u => u.id === id && u.pass === pass);
  const status = document.getElementById("login-status");
  if (user) {
    currentUser = user;
    status.innerText = "ようこそ " + user.id + " さん";
    localStorage.setItem("currentUser", user.id);
    spawnExplosion(200,150,"gold");
    spawnExplosion(200,150,"white");
    loginBonus();
    renderMissions();
    renderRanking();
  } else {
    status.innerText = "入場拒否";
  }
}

/* ログインボーナス */
function loginBonus() {
  if (!currentUser) {
    document.getElementById("bonus").innerText = "ログインするとボーナスがもらえます";
    return;
  }
  const keyLast = "lastLogin_" + currentUser.id;
  const keyPts = "points_" + currentUser.id;
  const last = localStorage.getItem(keyLast);
  const today = new Date().toLocaleDateString();
  let points = Number(localStorage.getItem(keyPts) || currentUser.points || 0);

  if (last !== today) {
    points += 10;
    localStorage.setItem(keyLast, today);
    localStorage.setItem(keyPts, points);
    document.getElementById("bonus").innerText =
      "🎁ログインボーナス +10pt（" + currentUser.id + "：" + points + "pt）";
  } else {
    document.getElementById("bonus").innerText =
      "今日のログインボーナスは受け取り済み（" + currentUser.id + "：" + points + "pt）";
  }
}

/* Canvas軽量派手エフェクト */
const canvas = document.getElementById("fxCanvas");
const ctx = canvas.getContext("2d");
function drawFx() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,50%)";
    ctx.beginPath();
    ctx.arc(Math.random() * 300, Math.random() * 150, Math.random() * 8, 0, Math.PI * 2);
    ctx.fill();
  }
}
setInterval(drawFx, 400);

/* 爆光エンジン */
const exCanvas = document.getElementById("explosionCanvas");
const exCtx = exCanvas.getContext("2d");
let particles = [];

function spawnExplosion(x, y, color="hsl(" + Math.random()*360 + ",100%,50%)") {
  for (let i = 0; i < 80; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 60,
      color
    });
  }
}

function renderExplosion() {
  exCtx.clearRect(0, 0, exCanvas.width, exCanvas.height);
  particles.forEach(p => {
    exCtx.fillStyle = p.color;
    exCtx.beginPath();
    exCtx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    exCtx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
  requestAnimationFrame(renderExplosion);
}
renderExplosion();

/* 光の滝 */
setInterval(() => {
  spawnExplosion(Math.random()*400, 0, "rgba(255,255,255,0.8)");
}, 200);

/* ホーム花火大会 */
setInterval(() => {
  spawnExplosion(Math.random()*400, Math.random()*300);
}, 500);

/* 豪華ルーレット */
function spin() {
  const wheel = document.getElementById("wheel");
  const deg = Math.floor(3600 + Math.random() * 360);
  wheel.style.transition = "4s cubic-bezier(.17,.67,.83,.67)";
  wheel.style.transform = `rotate(${deg}deg)`;
  setTimeout(() => {
    const effects = ["✨", "💥", "🌟", "🔥"];
    const effect = effects[Math.floor(Math.random() * effects.length)];
    alert(effect + " 当選：割引 or ポイントUP！ " + effect);
    spawnExplosion(200,150,"white");
    if (currentUser) {
      const keyPts = "points_" + currentUser.id;
      let points = Number(localStorage.getItem(keyPts) || 0);
      points += 5;
      localStorage.setItem(keyPts, points);
      document.getElementById("bonus").innerText =
        "ルーレットボーナス +5pt（" + currentUser.id + "：" + points + "pt）";
    }
    missionProgress("spin");
  }, 4000);
}

/* 商品データ（ローカル埋め込み） */
let products = [
  { id: 1, name: "激安スマホスタンド", price: 399, sale: "-50%", desc: "角度調整可能なスマホスタンド。激安なのに高品質！", image: "https://via.placeholder.com/150", timer: 10 },
  { id: 2, name: "LEDゲーミングマウス", price: 1299, sale: "-30%", desc: "RGBライト搭載のゲーミングマウス。クリック感最高。", image: "https://via.placeholder.com/150", timer: 20 },
  { id: 3, name: "中華系爆光キーボード", price: 2999, sale: "-40%", desc: "爆光RGB＋中華フォントキーキャップ。", image: "https://via.placeholder.com/150", timer: 30 }
];

/* 外部JSON読み込み（失敗したらローカル） */
fetch("products.json")
  .then(res => res.json())
  .then(data => { products = data; renderProducts(); })
  .catch(() => { renderProducts(); });

/* 商品一覧表示＋爆光セールタイマー */
function renderProducts() {
  const list = document.getElementById("product-list");
  list.innerHTML = "";
  products.forEach(p => {
    list.innerHTML += `
      <div class="product-card" onclick="spawnExplosion(event.clientX, event.clientY); showDetail(${p.id})">
        <span class="sale-label">${p.sale}</span>
        <div class="timer-label" id="timer-${p.id}">残り${p.timer || 0}秒</div>
        <img src="${p.image}" class="product-img">
        <p>${p.name}</p>
        <p class="price">¥${p.price}</p>
      </div>
    `;
  });
}
setInterval(() => {
  products.forEach(p => {
    if (p.timer > 0) {
      p.timer--;
      const el = document.getElementById("timer-" + p.id);
      if (el) el.innerText = "残り" + p.timer + "秒";
    } else if (p.timer === 0) {
      p.timer = -1;
      p.sale = "爆安-90%";
      spawnExplosion(200,150,"gold");
      document.body.style.animation = "flash 0.3s";
      alert("💥 " + p.name + " が爆光セール突入！");
      renderProducts();
    }
  });
}, 1000);

/* 商品詳細 */
function showDetail(id) {
  const p = products.find(x => x.id === id);
  const detail = document.getElementById("detail");
  detail.style.display = "block";
  detail.innerHTML = `
    <h2>${p.name}</h2>
    <img src="${p.image}" style="width:200px;border-radius:10px;">
    <p>${p.desc}</p>
    <p class="price">¥${p.price} <span class="sale-label">${p.sale}</span></p>
    <button onclick="addCart(${p.id})">🛒カートに追加</button>
  `;
  missionProgress("view");
  updateRecommend(p.id);
}

/* カート */
function getCart() { return JSON.parse(localStorage.getItem("cart") || "[]"); }
function saveCart(cart) { localStorage.setItem("cart", JSON.stringify(cart)); }

function addCart(id) {
  let cart = getCart();
  cart.push(id);
  saveCart(cart);
  renderCart();
  missionProgress("cart");
}

function removeCart(index) {
  let cart = getCart();
  cart.splice(index, 1);
  saveCart(cart);
  renderCart();
}

function renderCart() {
  spawnExplosion(200,150,"white");
  let cart = getCart();
  const area = document.getElementById("cart-items");
  const totalArea = document.getElementById("cart-total");
  area.innerHTML = "";
  let total = 0;
  cart.forEach((id, i) => {
    const p = products.find(x => x.id === id);
    total += p.price;
    area.innerHTML += `<p>${p.name} - ¥${p.price} <button onclick="removeCart(${i})">削除</button></p>`;
  });
  totalArea.innerText = "合計金額：¥" + total;
}
renderCart();

/* 割引（クーポン＋ポイント） */
function applyDiscount() {
  let cart = getCart();
  let total = cart.reduce((sum, id) => sum + products.find(p => p.id === id).price, 0);
  const coupon = document.getElementById("coupon").value;
  const usePts = Number(document.getElementById("use-points").value || 0);
  let discount = 0;
  if (coupon === "OFF10") discount += total * 0.1;
  if (currentUser) {
    const keyPts = "points_" + currentUser.id;
    let points = Number(localStorage.getItem(keyPts) || 0);
    if (usePts > points) {
      document.getElementById("discount-info").innerText = "ポイントが足りません";
      return;
    }
    discount += usePts;
    points -= usePts;
    localStorage.setItem(keyPts, points);
    document.getElementById("bonus").innerText = currentUser.id + "：" + points + "pt";
  }
  const final = Math.max(0, total - discount);
  document.getElementById("discount-info").innerText =
    "割引額：¥" + Math.floor(discount) + " / 支払金額：¥" + Math.floor(final);
}

/* 注文ページへ */
function goOrder() {
  showSection("order");
  let cart = getCart();
  const area = document.getElementById("order-items");
  const totalArea = document.getElementById("order-total");
  area.innerHTML = "";
  let total = 0;
  cart.forEach(id => {
    const p = products.find(x => x.id === id);
    total += p.price;
    area.innerHTML += `<p>${p.name} - ¥${p.price}</p>`;
  });
  totalArea.innerText = "合計金額：¥" + total;
}

/* 注文確定＋ランキング反映 */
function submitOrder() {
  const name = document.getElementById("order-name").value;
  const addr = document.getElementById("order-address").value;
  const pay = document.getElementById("order-pay").value;
  if (!name || !addr) {
    document.getElementById("order-result").innerText = "名前と住所を入力してください";
    return;
  }
  let cart = getCart();
  let total = cart.reduce((sum, id) => sum + products.find(p => p.id === id).price, 0);
  if (currentUser) {
    const keySpent = "spent_" + currentUser.id;
    let spent = Number(localStorage.getItem(keySpent) || 0);
    spent += total;
    localStorage.setItem(keySpent, spent);
  }
  const orderId = "ORD-" + Date.now();
  document.getElementById("order-result").innerText =
    "注文完了！注文番号：" + orderId + " / 支払い：" + pay;
  localStorage.setItem("lastOrder", orderId);
  missionProgress("order");
  renderRanking();
  spawnExplosion(200,150,"gold");
}

/* セクション切り替え */
function showSection(name) {
  document.getElementById("main-section").style.display = (name === "main") ? "block" : "none";
  document.getElementById("order").style.display = (name === "order") ? "block" : "none";
}

/* ガチャ（虹色渦＋爆光） */
function gachaExplosion(rarity) {
  let color = rarity==="SSR" ? "gold" : rarity==="SR" ? "purple" : "cyan";
  for (let i=0;i<10;i++){
    setTimeout(()=>spawnExplosion(200,150,color), i*60);
  }
}

function gacha() {
  const roll = Math.random();
  let rarity = "R";
  if (roll < 0.01) rarity = "SSR";
  else if (roll < 0.11) rarity = "SR";
  const p = products[Math.floor(Math.random() * products.length)];
  alert("🎰 ガチャ結果：" + rarity + " / " + p.name);
  gachaExplosion(rarity);
  addCart(p.id);
  if (currentUser) {
    const keyPts = "points_" + currentUser.id;
    let points = Number(localStorage.getItem(keyPts) || 0);
    points += (rarity === "SSR" ? 50 : rarity === "SR" ? 20 : 5);
    localStorage.setItem(keyPts, points);
    document.getElementById("bonus").innerText = currentUser.id + "：" + points + "pt";
  }
  missionProgress("gacha");
}

/* お年玉封筒乱舞 */
function otoshidama() {
  if (!currentUser) {
    alert("ログインしてからお年玉を受け取ってね");
    return;
  }
  const keyOto = "otoshidama_" + currentUser.id;
  const today = new Date().toLocaleDateString();
  const last = localStorage.getItem(keyOto);
  if (last === today) {
    alert("今日はもう受け取り済み");
    return;
  }
  const amount = Math.floor(Math.random() * 100) + 1;
  const keyPts = "points_" + currentUser.id;
  let points = Number(localStorage.getItem(keyPts) || 0);
  points += amount;
  localStorage.setItem(keyPts, points);
  localStorage.setItem(keyOto, today);
  alert("🧧 お年玉：" + amount + "pt");
  document.getElementById("bonus").innerText = currentUser.id + "：" + points + "pt";

  const area = document.getElementById("otoshidama-area");
  area.innerHTML = "";
  for (let i=0;i<10;i++){
    const f = document.createElement("div");
    f.innerText = "🧧";
    f.style.position="absolute";
    f.style.fontSize="40px";
    f.style.left=Math.random()*300+"px";
    f.style.top=Math.random()*200+"px";
    f.style.pointerEvents="auto";
    f.onclick=()=>{
      spawnExplosion(event.clientX,event.clientY,"red");
      f.remove();
    };
    area.appendChild(f);
  }
}

/* ミッション */
const missionsDef = [
  { id: "view", label: "商品を3つ見る", target: 3 },
  { id: "spin", label: "ルーレットを1回回す", target: 1 },
  { id: "gacha", label: "ガチャを1回引く", target: 1 },
  { id: "cart", label: "カートに3回追加", target: 3 },
  { id: "order", label: "注文を1回する", target: 1 }
];

function missionProgress(type) {
  if (!currentUser) return;
  const key = "mission_" + currentUser.id + "_" + type;
  let val = Number(localStorage.getItem(key) || 0);
  val++;
  localStorage.setItem(key, val);
  renderMissions();
}

function missionCompleteFX() {
  spawnExplosion(200,150,"gold");
  spawnExplosion(200,150,"white");
}

function renderMissions() {
  const box = document.getElementById("missions");
  if (!currentUser) {
    box.innerText = "ログインするとミッションが表示されます";
    return;
  }
  box.innerHTML = "<h4>🎯デイリーミッション</h4>";
  missionsDef.forEach(m => {
    const key = "mission_" + currentUser.id + "_" + m.id;
    let val = Number(localStorage.getItem(key) || 0);
    const done = val >= m.target;
    box.innerHTML += `<p>${m.label}：${val}/${m.target} ${done ? "✅" : ""}</p>`;
    if (done) missionCompleteFX();
  });
}

/* ランキング */
function renderRanking() {
  const box = document.getElementById("ranking");
  box.innerHTML = "<h4>🏆ランキング（購入額）</h4>";
  let data = users.map(u => {
    const keySpent = "spent_" + u.id;
    let spent = Number(localStorage.getItem(keySpent) || 0);
    return { id: u.id, spent };
  }).sort((a, b) => b.spent - a.spent);
  data.forEach((u, i) => {
    box.innerHTML += `<p>${i + 1}位：${u.id} - ¥${u.spent}</p>`;
  });
}

/* AIおすすめ */
function updateRecommend(lastId) {
  const box = document.getElementById("recommend-list");
  box.innerHTML = "";
  products.filter(p => p.id !== lastId).slice(0, 2).forEach(p => {
    box.innerHTML += `
      <div class="product-card recommend-glow">
        <span class="sale-label">${p.sale}</span>
        <img src="${p.image}" class="product-img">
        <p>${p.name}</p>
        <p class="price">¥${p.price}</p>
      </div>
    `;
  });
}

/* 起動時 */
window.onload = () => {
  const savedId = localStorage.getItem("currentUser");
  if (savedId) {
    const user = users.find(u => u.id === savedId);
    if (user) {
      currentUser = user;
      document.getElementById("login-status").innerText = "ようこそ " + user.id + " さん";
      loginBonus();
      renderMissions();
      renderRanking();
    }
  } else {
    renderRanking();
  }
};
</script>
